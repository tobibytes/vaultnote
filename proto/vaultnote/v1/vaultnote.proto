syntax = "proto3";

package vaultnote.v1;

option csharp_namespace = "VaultNote.Proto";

import "google/protobuf/timestamp.proto";

service VaultNoteService {
  rpc Ping (PingRequest) returns (PingResponse);
  rpc CreateNote (CreateNoteRequest) returns (CreateNoteResponse);
  rpc ListNotes (ListNotesRequest) returns (ListNotesResponse);

  // Milestone 6: server-streaming search
  rpc SearchNotes (SearchNotesRequest) returns (stream Note);

  // Milestone 7: client-streaming document upload
  rpc UploadDocument (stream UploadDocumentRequest) returns (UploadDocumentResponse);

  // Milestone 8: bidirectional "Ask Vault" session
  rpc AskVault (stream AskVaultRequest) returns (stream AskVaultResponse);
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

message Note {
  string id = 1;
  string title = 2;
  string content = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CreateNoteRequest {
  string title = 1;
  string content = 2;
}

message CreateNoteResponse {
  Note note = 1;
}

message ListNotesRequest {}

message ListNotesResponse {
  repeated Note notes = 1;
}

// Milestone 6
message SearchNotesRequest {
  string query = 1;
}

// Milestone 7
message UploadDocumentRequest {
  string note_id  = 1;
  string filename = 2;
  bytes  chunk    = 3;
}

message UploadDocumentResponse {
  string document_id    = 1;
  int64  bytes_received = 2;
}

// Milestone 8
message AskVaultRequest {
  string question = 1;
}

// AskVaultResponse streams one token at a time.  Clients should concatenate
// all tokens to assemble the full answer text.
message AskVaultResponse {
  string token = 1;
}
